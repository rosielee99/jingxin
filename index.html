<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="静心">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FFF8F0">
  <meta name="description" content="静心 — 看见焦虑，记录成长">
  <title>静心</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23E8906A'/><text x='16' y='22' text-anchor='middle' font-size='18' fill='white'>静</text></svg>">

  <link rel="stylesheet" href="css/tokens.css?v=3">
  <link rel="stylesheet" href="css/base.css?v=3">
  <link rel="stylesheet" href="css/page.css?v=4">
  <link rel="stylesheet" href="css/features/anxiety-journal.css?v=4">
</head>
<body>

  <main id="page-container">

    <!-- ===== Page Header ===== -->
    <header class="page-header">
      <h1 class="page-title">静心 🌿</h1>
      <p class="page-subtitle">每天和自己对话 3 分钟</p>
    </header>

    <!-- ===== 今天 ===== -->
    <section class="page-card" id="view-checkin">
      <div class="card-body" id="checkin-body"></div>
    </section>

    <!-- ===== 日记 ===== -->
    <section class="page-card" id="view-journal">
      <div class="card-header">
        <span class="card-icon" style="background:#E8F5F1">📝</span>
        <div><h2>心情日记</h2><p class="text-muted">焦虑和开心，都值得被记录</p></div>
      </div>
      <div class="card-body" id="journal-body"></div>
    </section>

    <!-- ===== 趋势 ===== -->
    <section class="page-card" id="view-trends">
      <div class="card-header">
        <span class="card-icon">📊</span>
        <div><h2>趋势</h2><p class="text-muted">看到变化，看到规律</p></div>
      </div>
      <div class="card-body" id="trends-body"></div>
    </section>

    <!-- ===== Footer ===== -->
    <footer class="page-footer">
      <p style="font-size:11px;color:#B0BEC5">🔒 数据仅存储在你的浏览器本地</p>
    </footer>

  </main>

  <script src="js/storage.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
  <script src="js/features/checkin.js?v=4"></script>
  <script src="js/features/journal.js?v=4"></script>
  <script src="js/features/trends.js?v=4"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
